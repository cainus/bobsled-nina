<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naña's Run</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    canvas { display: block; }
    #ui-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
    }
    #score {
      position: absolute;
      top: 20px; right: 30px;
      color: #fff;
      font-size: 32px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    }
    #metal-display {
      position: absolute;
      top: 140px; right: 30px;
      color: #ffdd00;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
      animation: metalPulse 0.3s infinite alternate;
    }
    @keyframes metalPulse {
      from { color: #ffdd00; }
      to { color: #ff4400; }
    }
    #shield-display {
      position: absolute;
      top: 100px; right: 30px;
      color: #ff4444;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    }
    #coins-display {
      position: absolute;
      top: 60px; right: 30px;
      color: #aaeeff;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    }
    #start-screen, #game-over-screen, #pause-screen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      pointer-events: all;
    }
    #game-over-screen, #pause-screen { display: none; }
    h1 {
      font-size: 72px;
      color: #fff;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
      margin-bottom: 10px;
    }
    h1 span { color: #ff6b9d; }
    .subtitle {
      color: #aad4ff;
      font-size: 22px;
      margin-bottom: 40px;
    }
    .btn {
      padding: 16px 48px;
      font-size: 24px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(135deg, #ff6b9d, #c44dff);
      color: #fff;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
      transition: transform 0.1s;
    }
    .btn:hover { transform: scale(1.05); }
    .btn:active { transform: scale(0.95); }
    .season-btn {
      background-size: cover;
      background-position: center;
      width: 200px; height: 200px;
      border-radius: 12px;
      border: 3px solid rgba(255,255,255,0.3);
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 8px;
      font-size: 16px;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
      transition: transform 0.1s, border-color 0.15s;
    }
    .season-btn:hover { transform: scale(1.08); border-color: #fff; }
    .controls-hint {
      color: #888;
      font-size: 16px;
      margin-top: 24px;
    }
    #final-score {
      font-size: 48px;
      color: #aaeeff;
      margin: 20px 0;
    }
    #final-coins {
      font-size: 28px;
      color: #aaeeff;
      margin-bottom: 30px;
    }
  </style>
</head>
<body>
  <div id="ui-overlay">
    <div id="score">0</div>
    <div id="coins-display">Snowflakes: 0</div>
    <div id="shield-display" style="display:none"></div>
    <div id="metal-display" style="display:none">METAL MODE 2x</div>

    <div id="start-screen">
      <img id="splash-img" src="images/Splash.png" alt="Naña's Run" style="max-width:min(700px,90vw);max-height:55vh;object-fit:contain;margin-bottom:24px;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.6)">
      <div id="season-picker" style="display:none;margin-bottom:24px">
        <div class="subtitle" style="margin-bottom:10px;color:#aad4ff">Pick a season to start</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
          <button class="btn season-btn" data-season="winter" style="background-image:url('images/winter.jpg')">Winter</button>
          <button class="btn season-btn" data-season="spring" style="background-image:url('images/spring.jpg')">Spring</button>
          <button class="btn season-btn" data-season="summer" style="background-image:url('images/summer.jpg')">Summer</button>
          <button class="btn season-btn" data-season="autumn" style="background-image:url('images/autumn.jpg')">Autumn</button>
        </div>
      </div>
      <div id="loading-text" class="subtitle" style="color:#ff6b9d">Loading... 0%</div>
      <div id="loading-bar-bg" style="width:220px;height:8px;background:rgba(255,255,255,0.15);border-radius:4px;margin-top:12px;overflow:hidden">
        <div id="loading-bar" style="width:0%;height:100%;background:linear-gradient(90deg,#ff6b9d,#c44dff);border-radius:4px;transition:width 0.15s"></div>
      </div>
      <div class="controls-hint" id="controls-hint" style="display:none">← → or A/D to switch lanes &nbsp;|&nbsp; ↑ or W to jump &nbsp;|&nbsp; ↓ or S to duck</div>
    </div>

    <div id="pause-screen">
      <h1>Paused</h1>
      <button class="btn" id="continue-btn" style="margin-bottom:16px">CONTINUE</button>
      <button class="btn" id="pause-restart-btn">RESTART</button>
    </div>

    <div id="game-over-screen">
      <h1>Game Over!</h1>
      <div id="final-score">0</div>
      <div id="final-coins">Coins: 0</div>
      <button class="btn" id="restart-btn">PLAY AGAIN</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
